<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🚌 BUS TIMETABLE</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0f172a;
  color: #e2e8f0;
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
  max-width: 600px;
  margin: 0 auto;
  min-height: 100vh;
}

/* ヘッダー */
header {
  background: #1e293b;
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid #334155;
}
.title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #94a3b8;
}
.clock {
  font-size: 22px;
  font-weight: 700;
  color: #4ade80;
  font-variant-numeric: tabular-nums;
  letter-spacing: 1px;
}

/* バス停タブ */
.stop-tabs {
  background: #1e293b;
  display: flex;
  overflow-x: auto;
  border-bottom: 1px solid #334155;
  scrollbar-width: none;
}
.stop-tabs::-webkit-scrollbar { display: none; }
.stop-tab {
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 600;
  color: #64748b;
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  flex-shrink: 0;
  transition: color 0.15s;
}
.stop-tab.active {
  color: #e2e8f0;
  border-bottom-color: #3b82f6;
}

/* 曜日セレクター */
.day-selector {
  padding: 10px 16px;
  display: flex;
  gap: 8px;
  background: #1e293b;
  border-bottom: 1px solid #334155;
}
.day-btn {
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid #334155;
  background: transparent;
  color: #64748b;
  transition: all 0.15s;
}
.day-btn.active {
  background: #1d4ed8;
  color: white;
  border-color: #1d4ed8;
}
.day-btn.today-style { color: #4ade80; border-color: #16a34a; }
.day-btn.today-style.active {
  background: #14532d;
  border-color: #4ade80;
  color: #4ade80;
}

/* ルートフィルター */
.route-filters {
  padding: 10px 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  background: #0f172a;
}
.route-pill {
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  opacity: 0.35;
  transition: opacity 0.15s;
  user-select: none;
}
.route-pill.active { opacity: 1; }

/* 次のバス */
.next-bus {
  margin: 10px 16px;
  background: #1e293b;
  border-radius: 12px;
  padding: 14px 16px;
  border: 1px solid #334155;
}
.next-label {
  font-size: 12px;
  color: #94a3b8;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.next-time-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.next-left { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
.next-time {
  font-size: 42px;
  font-weight: 700;
  color: #4ade80;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
.next-badge {
  padding: 3px 8px;
  border-radius: 5px;
  font-size: 11px;
  font-weight: 700;
}
.next-right { text-align: right; flex-shrink: 0; }
.next-min-label { font-size: 12px; color: #94a3b8; }
.next-min-val {
  font-size: 30px;
  font-weight: 700;
  color: #f1f5f9;
  font-variant-numeric: tabular-nums;
  line-height: 1.1;
}
.next-min-unit { font-size: 13px; color: #94a3b8; }

/* 件数・全表示 */
.bus-meta {
  padding: 6px 16px 4px;
  font-size: 12px;
  color: #64748b;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.show-all-btn {
  font-size: 12px;
  color: #3b82f6;
  cursor: pointer;
  background: none;
  border: 1px solid #1d4ed855;
  border-radius: 6px;
  padding: 3px 10px;
}
.show-all-btn:hover { background: #1d4ed820; }

/* バスリスト */
.bus-list {
  padding: 0 16px 100px;
}
.bus-item {
  background: #1e293b;
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-left: 4px solid;
}
.bus-left {}
.bus-time {
  font-size: 24px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: #e2e8f0;
  line-height: 1;
}
.bus-route {
  font-size: 11px;
  font-weight: 600;
  margin-top: 3px;
}
.bus-right {
  font-size: 14px;
  color: #94a3b8;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.bus-item.now-bus .bus-time { color: #4ade80; }
.bus-item.now-bus .bus-right { color: #4ade80; font-weight: 700; }

.empty-msg {
  text-align: center;
  color: #64748b;
  font-size: 14px;
  padding: 24px;
}
</style>
</head>
<body>

// ========== ユーティリティ ==========
function toISO(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function getActualDayType(d = new Date()) {
  const dow = d.getDay();
  if (dow === 0 || HOLIDAYS_2026.has(toISO(d))) return 'holiday';
  if (dow === 6) return 'saturday';
  return 'weekday';
}

function getDayType() {
  return currentDay === 'today' ? getActualDayType() : currentDay;
}

function timeToMin(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function nowMinutes() {
  const n = new Date();
  return n.getHours() * 60 + n.getMinutes();
}

// ========== 時計 ==========
function updateClock() {
  const n = new Date();
  const pad = v => String(v).padStart(2,'0');
  document.getElementById('clock').textContent =
    `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
}

// ========== データ取得 ==========
function getUpcomingBuses() {
  const stop = STOPS[currentStop];
  const day = getDayType();
  const now = nowMinutes();

  const buses = [];
  stop.routes.forEach(r => {
    if (!activeRoutes[stop.id + '_' + r.id]) return;
    const times = r[day] || r.weekday;
    times.forEach(t => {
      const m = timeToMin(t);
      buses.push({ time: t, mins: m, diff: m - now, route: r });
    });
  });

  buses.sort((a, b) => a.mins - b.mins);
  return buses;
}

// ========== レンダリング ==========
function renderStopTabs() {
  document.getElementById('stopTabs').innerHTML = STOPS.map((s, i) =>
    `<div class="stop-tab ${i===currentStop?'active':''}" onclick="selectStop(${i})">${s.name}</div>`
  ).join('');
}

function renderDaySelector() {
  const actual = getActualDayType();
  ['weekday','saturday','holiday'].forEach(d => {
    const el = document.getElementById('btn-' + d);
    if (el) el.classList.toggle('active', currentDay === d);
  });
  const todayEl = document.getElementById('btn-today');
  if (todayEl) todayEl.classList.toggle('active', currentDay === 'today');
}

function renderRouteFilters() {
  const stop = STOPS[currentStop];
  document.getElementById('routeFilters').innerHTML = stop.routes.map(r => {
    const key = stop.id + '_' + r.id;
    return `<div class="route-pill ${activeRoutes[key]?'active':''}"
      style="background:${r.color}22;color:${r.color};border:1px solid ${r.color}88"
      onclick="toggleRoute('${key}')">${r.label}</div>`;
  }).join('');
}

function renderNextBus(buses) {
  const upcoming = buses.filter(b => b.diff >= 0);
  const el = document.getElementById('nextBus');
  if (!upcoming.length) {
    el.innerHTML = `<div class="empty-msg">本日の運行は終了しました</div>`;
    return;
  }
  const n = upcoming[0];
  el.innerHTML = `
    <div class="next-label">▶ 次のバス</div>
    <div class="next-time-row">
      <div class="next-left">
        <span class="next-time">${n.time}</span>
        <span class="next-badge" style="background:${n.route.color}33;color:${n.route.color}">${n.route.label}</span>
      </div>
      <div class="next-right">
        <div class="next-min-label">あと</div>
        <div><span class="next-min-val">${n.diff}</span><span class="next-min-unit"> 分</span></div>
      </div>
    </div>`;
}

function renderBusList(buses) {
  const now = nowMinutes();
  const upcoming = buses.filter(b => b.diff >= 0);
  const total = upcoming.length;

  document.getElementById('busCount').textContent = `${total}件の便`;
  document.getElementById('showAllBtn').textContent = showAll ? '直近のみ表示' : '全便を表示';

  const display = showAll ? upcoming : upcoming.slice(0, 15);
  document.getElementById('busList').innerHTML = display.length
    ? display.map(b => `
        <div class="bus-item ${b.diff <= 1 ? 'now-bus' : ''}" style="border-left-color:${b.route.color}">
          <div class="bus-left">
            <div class="bus-time">${b.time}</div>
            <div class="bus-route" style="color:${b.route.color}">${b.route.label}</div>
          </div>
          <div class="bus-right">${b.diff === 0 ? '今すぐ' : b.diff + '分後'}</div>
        </div>`).join('')
    : `<div class="empty-msg">本日の運行は終了しました</div>`;
}

function render() {
  const buses = getUpcomingBuses();
  renderDaySelector();
  renderRouteFilters();
  renderNextBus(buses);
  renderBusList(buses);
}

// ========== イベントハンドラ ==========
function selectStop(i) {
  currentStop = i;
  showAll = false;
  renderStopTabs();
  render();
}
function setDay(d) { currentDay = d; render(); }
function toggleRoute(key) { activeRoutes[key] = !activeRoutes[key]; render(); }
function toggleShowAll() { showAll = !showAll; renderBusList(getUpcomingBuses()); }

// ========== 起動 ==========
renderStopTabs();
render();
updateClock();
setInterval(updateClock, 1000);

// 毎分0秒に合わせて再描画
(function scheduleRender() {
  const ms = (60 - new Date().getSeconds()) * 1000;
  setTimeout(() => { render(); setInterval(render, 60000); }, ms);
})();
</script>
